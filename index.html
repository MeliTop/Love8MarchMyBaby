<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>С 8 марта ❤️ букет для тебя</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffd0d0 0%, #ffadad 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            overflow-x: hidden;
            position: relative;
        }

        /* ЛЕТАЮЩИЕ ФОТО НА ФОНЕ - максимально видимые */
        .floating-photos {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .float-photo {
            position: absolute;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 10px 25px rgba(255, 60, 60, 0.5);
            animation: float 15s infinite ease-in-out;
            opacity: 0.85 !important; /* ОЧЕНЬ ЯРКО */
            filter: brightness(1.1); /* Еще ярче */
        }

        /* РАЗМЕРЫ ДЛЯ ВСЕХ УСТРОЙСТВ - МАКСИМАЛЬНАЯ ВИДИМОСТЬ */
        @media (min-width: 1200px) { .float-photo { width: 150px; height: 150px; } }
        @media (min-width: 769px) and (max-width: 1199px) { .float-photo { width: 130px; height: 130px; } }
        @media (max-width: 768px) { .float-photo { width: 110px; height: 110px; opacity: 0.9 !important; } }
        @media (max-width: 480px) { .float-photo { width: 100px; height: 100px; opacity: 0.95 !important; } }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(35px, -35px) rotate(6deg); }
            50% { transform: translate(65px, 25px) rotate(-6deg); }
            75% { transform: translate(25px, 60px) rotate(4deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* РАСПОЛОЖЕНИЕ 10 ФОТО - равномерно по всему экрану */
        .float-photo:nth-child(1) { top: 3%; left: 5%; }
        .float-photo:nth-child(2) { top: 70%; left: 2%; }
        .float-photo:nth-child(3) { top: 10%; right: 3%; }
        .float-photo:nth-child(4) { bottom: 5%; right: 8%; }
        .float-photo:nth-child(5) { top: 45%; left: 10%; }
        .float-photo:nth-child(6) { top: 25%; left: 70%; }
        .float-photo:nth-child(7) { bottom: 25%; left: 15%; }
        .float-photo:nth-child(8) { top: 65%; right: 15%; }
        .float-photo:nth-child(9) { bottom: 35%; right: 25%; }
        .float-photo:nth-child(10) { top: 85%; left: 40%; }

        /* РАЗНАЯ СКОРОСТЬ АНИМАЦИИ */
        .float-photo:nth-child(1) { animation-duration: 19s; }
        .float-photo:nth-child(2) { animation-duration: 23s; }
        .float-photo:nth-child(3) { animation-duration: 21s; }
        .float-photo:nth-child(4) { animation-duration: 25s; }
        .float-photo:nth-child(5) { animation-duration: 18s; }
        .float-photo:nth-child(6) { animation-duration: 22s; }
        .float-photo:nth-child(7) { animation-duration: 24s; }
        .float-photo:nth-child(8) { animation-duration: 20s; }
        .float-photo:nth-child(9) { animation-duration: 26s; }
        .float-photo:nth-child(10) { animation-duration: 23s; }

        .container {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 240, 240, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 50px;
            padding: 22px 16px;
            box-shadow: 0 20px 30px rgba(255, 80, 80, 0.3), 0 0 0 4px white inset;
            border: 1px solid #ffaeae;
            position: relative;
            z-index: 2;
        }

        .title {
            text-align: center;
            margin-bottom: 16px;
        }

        .title h1 {
            font-size: 2.4rem;
            color: #d43b3b;
            text-shadow: 3px 3px 0 #ffe0e0;
        }

        .title p {
            color: #b54545;
            font-size: 1.2rem;
        }

        .counter-box {
            background: white;
            border-radius: 50px;
            padding: 12px 20px;
            margin: 12px 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 0 #ff9f9f;
            border: 2px solid #ff7b7b;
        }

        .counter-text {
            color: #b54545;
            font-weight: 600;
            font-size: 1.2rem;
        }

        .counter-number {
            background: #ff7b7b;
            color: white;
            padding: 5px 22px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.5rem;
            box-shadow: 0 3px 0 #b54545;
        }

        .game-area {
            background: rgba(255, 210, 210, 0.8);
            border-radius: 40px;
            padding: 20px 12px;
            border: 3px dashed white;
            margin-bottom: 12px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-area.hidden {
            display: none;
        }

        .flowers-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            width: 100%;
        }

        .flower-item {
            font-size: 3.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            filter: drop-shadow(0 5px 0 #d46b6b);
            width: 85px;
            height: 85px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff2c9;
            border-radius: 25px;
            border: 3px solid white;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
            z-index: 10;
        }

        .flower-item:active {
            transform: scale(0.7);
            filter: drop-shadow(0 2px 0 #d46b6b);
        }

        .flower-item.collected {
            opacity: 0;
            pointer-events: none;
            transform: scale(0);
        }

        .hint {
            color: #b54545;
            margin-top: 15px;
            font-size: 1.1rem;
        }

        .final-section {
            margin: 16px 0 12px;
            display: none;
        }

        .final-section.show {
            display: block;
            animation: popIn 0.6s ease-out;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.3); }
            100% { opacity: 1; transform: scale(1); }
        }

        .bouquet-card {
            background: #ffdede;
            border-radius: 40px;
            padding: 10px;
            border: 4px solid white;
            box-shadow: 0 12px 0 #d46b6b;
            transform: rotate(1deg);
        }

        .bouquet-square {
            aspect-ratio: 1 / 1;
            width: 100%;
            background: linear-gradient(145deg, #ffb3b3, #ff8f8f);
            border-radius: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 3px solid white;
            position: relative;
        }

        .big-bouquet {
            font-size: 7rem;
            filter: drop-shadow(0 10px 8px rgba(180, 60, 60, 0.4));
            animation: wiggle 3s infinite;
            margin-bottom: 5px;
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }

        .for-you-text {
            font-size: 2.2rem;
            font-weight: 800;
            color: white;
            text-shadow: 3px 3px 0 #d44b4b;
            background: rgba(255, 120, 120, 0.9);
            padding: 8px 20px;
            border-radius: 40px;
            backdrop-filter: blur(3px);
            border: 2px solid white;
            transform: rotate(-2deg);
        }

        .big-corner-photo {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid white;
            object-fit: cover;
            box-shadow: 0 5px 0 #b15858;
        }

        @media (max-width: 480px) {
            .big-corner-photo { width: 70px; height: 70px; }
        }

        .congrats-message {
            background: #fff0f0;
            border-radius: 30px;
            padding: 18px;
            margin-top: 12px;
            border: 3px solid #ffa5a5;
            color: #882e2e;
            text-align: center;
        }

        .congrats-message h2 {
            font-size: 1.9rem;
            color: #ff6b6b;
            margin-bottom: 8px;
        }

        .congrats-message p {
            font-size: 1.1rem;
            line-height: 1.4;
            margin: 6px 0;
        }

        .reset-button {
            background: #ffa5a5;
            border: none;
            padding: 15px 28px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            border-bottom: 4px solid #b15858;
            width: 100%;
            margin-top: 12px;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            z-index: 10;
        }

        .reset-button:active {
            border-bottom-width: 2px;
            transform: translateY(2px);
        }

        footer {
            text-align: center;
            margin-top: 12px;
            color: #b57a7a;
            font-size: 0.9rem;
        }

        #bgMusic { display: none; }
    </style>
</head>
<body>
    <!-- ЛЕТАЮЩИЕ ФОТО - 10 ШТУК -->
    <div class="floating-photos">
        <img src="foto1.jpg" class="float-photo" alt="фото1" onerror="this.style.background='#ff8a8a'; this.style.display='flex'; this.style.alignItems='center'; this.style.justifyContent='center'; this.style.fontSize='2.5rem'; this.alt='❤️';">
        <img src="foto2.jpg" class="float-photo" alt="фото2" onerror="this.style.background='#ff8a8a'; this.style.display='flex'; this.style.alignItems='center'; this.style.justifyContent='center'; this.style.fontSize='2.5rem'; this.alt='❤️';">
        <img src="foto3.jpg" class="float-photo" alt="фото3" onerror="this.style.background='#ff8a8a'; this.style.display='flex'; this.style.alignItems='center'; this.style.justifyContent='center'; this.style.fontSize='2.5rem'; this.alt='❤️';">
        <img src="foto4.jpg" class="float-photo" alt="фото4" onerror="this.style.background='#ff8a8a'; this.style.display='flex'; this.style.alignItems='center'; this.style.justifyContent='center'; this.style.fontSize='2.5rem'; this.alt='❤️';">
        <img src="foto5.jpg" class="float-photo" alt="фото5" onerror="this.style.background='#ff8a8a'; this.style.display='flex'; this.style.alignItems='center'; this.style.justifyContent='center'; this.style.fontSize='2.5rem'; this.alt='❤️';">
        <img src="foto6.jpg" class="float-photo" alt="фото6" onerror="this.style.background='#ff8a8a'; this.style.display='flex'; this.style.alignItems='center'; this.style.justifyContent='center'; this.style.fontSize='2.5rem'; this.alt='❤️';">
        <img src="foto7.jpg" class="float-photo" alt="фото7" onerror="this.style.background='#ff8a8a'; this.style.display='flex'; this.style.alignItems='center'; this.style.justifyContent='center'; this.style.fontSize='2.5rem'; this.alt='❤️';">
        <img src="foto8.jpg" class="float-photo" alt="фото8" onerror="this.style.background='#ff8a8a'; this.style.display='flex'; this.style.alignItems='center'; this.style.justifyContent='center'; this.style.fontSize='2.5rem'; this.alt='❤️';">
        <img src="foto9.jpg" class="float-photo" alt="фото9" onerror="this.style.background='#ff8a8a'; this.style.display='flex'; this.style.alignItems='center'; this.style.justifyContent='center'; this.style.fontSize='2.5rem'; this.alt='❤️';">
        <img src="foto10.jpg" class="float-photo" alt="фото10" onerror="this.style.background='#ff8a8a'; this.style.display='flex'; this.style.alignItems='center'; this.style.justifyContent='center'; this.style.fontSize='2.5rem'; this.alt='❤️';">
    </div>

    <div class="container">
        <div class="title">
            <h1>💐 8 марта 💐</h1>
            <p>Собери букет!</p>
        </div>

        <div class="counter-box">
            <span class="counter-text">Цветов:</span>
            <span class="counter-number" id="counterDisplay">0/9</span>
        </div>

        <div class="game-area" id="gameArea">
            <div class="flowers-grid" id="flowersGrid"></div>
            <div class="hint" id="hintMessage">нажми на цветок 🌷</div>
        </div>

        <div class="final-section" id="finalSection">
            <div class="bouquet-card">
                <div class="bouquet-square">
                    <div class="big-bouquet">💐</div>
                    <div class="for-you-text">ЭТО ТЕБЕ</div>
                    <img src="foto1.jpg" class="big-corner-photo" id="cornerPhoto" onerror="this.style.background='#ff8a8a'; this.style.display='flex'; this.style.alignItems='center'; this.style.justifyContent='center'; this.style.fontSize='2rem'; this.alt='❤️';">
                </div>
            </div>
            
            <div class="congrats-message">
                <h2>С 8 Марта!</h2>
                <p>Моя любимая, этот букет</p>
                <p>для самой красивой девочки моей!</p>
                <p>❤️ ❤️ ❤️</p>
            </div>
        </div>

        <button class="reset-button" id="resetBtn">✔️ начать сначала</button>
        <footer>собери 9 цветов</footer>
    </div>

    <audio id="bgMusic" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        (function() {
            const MUSIC_START_SECONDS = 47;
            const TOTAL_FLOWERS = 9;
            let collectedCount = 0;
            let gameActive = true;
            let musicStarted = false;
            let musicReady = false;

            const flowersGrid = document.getElementById('flowersGrid');
            const counterDisplay = document.getElementById('counterDisplay');
            const gameArea = document.getElementById('gameArea');
            const finalSection = document.getElementById('finalSection');
            const hintMessage = document.getElementById('hintMessage');
            const resetBtn = document.getElementById('resetBtn');
            const bgMusic = document.getElementById('bgMusic');

            bgMusic.addEventListener('loadedmetadata', () => {
                if (bgMusic.duration > MUSIC_START_SECONDS) bgMusic.currentTime = MUSIC_START_SECONDS;
                musicReady = true;
            });

            function tryPlayMusic() {
                if (!musicStarted && musicReady) {
                    bgMusic.play().then(() => musicStarted = true).catch(() => {});
                }
            }

            function handleFlowerClick(flower) {
                if (!gameActive || flower.classList.contains('collected')) return;
                flower.classList.add('collected');
                collectedCount++;
                counterDisplay.textContent = `${collectedCount}/${TOTAL_FLOWERS}`;
                
                if (collectedCount === TOTAL_FLOWERS) {
                    gameActive = false;
                    gameArea.style.display = 'none';
                    finalSection.classList.add('show');
                    hintMessage.textContent = '🎉 букет собран! 🎉';
                } else {
                    hintMessage.textContent = `осталось ${TOTAL_FLOWERS - collectedCount}`;
                }
            }

            function createFlower() {
                const flower = document.createElement('div');
                flower.className = 'flower-item';
                flower.textContent = '🌷';
                
                ['click', 'touchstart'].forEach(event => {
                    flower.addEventListener(event, (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        tryPlayMusic();
                        handleFlowerClick(flower);
                    }, { passive: false });
                });
                return flower;
            }

            function resetGame() {
                flowersGrid.innerHTML = '';
                collectedCount = 0;
                gameActive = true;
                counterDisplay.textContent = `0/${TOTAL_FLOWERS}`;
                gameArea.style.display = 'flex';
                finalSection.classList.remove('show');
                hintMessage.textContent = 'нажми на цветок 🌷';
                
                for (let i = 0; i < TOTAL_FLOWERS; i++) {
                    flowersGrid.appendChild(createFlower());
                }
                
                if (musicReady) bgMusic.currentTime = MUSIC_START_SECONDS;
                if (musicStarted) { bgMusic.pause(); musicStarted = false; }
            }

            ['click', 'touchstart'].forEach(event => {
                resetBtn.addEventListener(event, (e) => {
                    e.preventDefault();
                    resetGame();
                }, { passive: false });
            });
            
            resetGame();
            setTimeout(tryPlayMusic, 500);
        })();
    </script>
</body>
</html>
