<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>С 8 марта ❤️ букет для тебя</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffd0d0 0%, #ffadad 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            overflow-x: hidden;
            position: relative;
        }

        /* ЛЕТАЮЩИЕ ФОТО НА ФОНЕ - всегда видно */
        .floating-photos {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .float-photo {
            position: absolute;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 10px 20px rgba(255, 80, 80, 0.4);
            animation: float 15s infinite ease-in-out;
            opacity: 0.65; /* Ярче чтобы было видно */
        }

        /* РАЗМЕРЫ ДЛЯ РАЗНЫХ ЭКРАНОВ */
        @media (min-width: 1200px) { /* Компьютер */
            .float-photo { width: 140px; height: 140px; border-width: 6px; opacity: 0.55; }
        }
        
        @media (min-width: 769px) and (max-width: 1199px) { /* Планшеты */
            .float-photo { width: 110px; height: 110px; }
        }
        
        @media (max-width: 768px) { /* Телефоны */
            .float-photo { width: 80px; height: 80px; opacity: 0.7; }
        }

        @media (max-width: 480px) { /* Маленькие телефоны */
            .float-photo { width: 70px; height: 70px; }
        }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(30px, -30px) rotate(5deg); }
            50% { transform: translate(60px, 20px) rotate(-5deg); }
            75% { transform: translate(20px, 50px) rotate(3deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* РАСПОЛОЖЕНИЕ 10 ФОТО */
        .float-photo:nth-child(1) { top: 5%; left: 2%; animation-duration: 20s; }
        .float-photo:nth-child(2) { top: 70%; left: 5%; animation-duration: 24s; }
        .float-photo:nth-child(3) { top: 15%; right: 2%; animation-duration: 22s; }
        .float-photo:nth-child(4) { bottom: 10%; right: 5%; animation-duration: 26s; }
        .float-photo:nth-child(5) { top: 40%; left: 15%; animation-duration: 19s; }
        .float-photo:nth-child(6) { top: 20%; left: 60%; animation-duration: 21s; }
        .float-photo:nth-child(7) { bottom: 25%; left: 10%; animation-duration: 23s; }
        .float-photo:nth-child(8) { top: 60%; right: 8%; animation-duration: 20s; }
        .float-photo:nth-child(9) { bottom: 30%; right: 20%; animation-duration: 25s; }
        .float-photo:nth-child(10) { top: 80%; left: 30%; animation-duration: 22s; }

        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 240, 240, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 60px;
            padding: 24px 18px;
            box-shadow: 0 20px 40px rgba(255, 100, 100, 0.4), 0 0 0 4px white inset;
            border: 1px solid #ffaeae;
            position: relative;
            z-index: 2;
        }

        .title {
            text-align: center;
            margin-bottom: 20px;
        }

        .title h1 {
            font-size: clamp(2rem, 8vw, 2.8rem);
            color: #d43b3b;
            text-shadow: 3px 3px 0 #ffe0e0;
        }

        .title p {
            color: #b54545;
            font-size: clamp(1rem, 4vw, 1.3rem);
        }

        .counter-box {
            background: white;
            border-radius: 60px;
            padding: clamp(10px, 3vw, 15px) clamp(15px, 4vw, 25px);
            margin: 15px 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 5px 0 #ff9f9f;
            border: 2px solid #ff7b7b;
        }

        .counter-text {
            color: #b54545;
            font-weight: 600;
            font-size: clamp(1rem, 4vw, 1.3rem);
        }

        .counter-number {
            background: #ff7b7b;
            color: white;
            padding: 5px clamp(15px, 5vw, 25px);
            border-radius: 40px;
            font-weight: bold;
            font-size: clamp(1.2rem, 5vw, 1.6rem);
            box-shadow: 0 3px 0 #b54545;
        }

        .game-area {
            background: #ffc9c9;
            border-radius: 50px;
            padding: 25px 15px;
            border: 4px dashed white;
            margin-bottom: 15px;
            min-height: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .game-area.hidden {
            display: none;
        }

        .flowers-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: clamp(8px, 3vw, 15px);
            width: 100%;
        }

        .flower-item {
            font-size: clamp(2.5rem, 10vw, 4rem);
            cursor: pointer;
            transition: all 0.2s ease;
            filter: drop-shadow(0 4px 0 #d46b6b);
            width: clamp(70px, 20vw, 100px);
            height: clamp(70px, 20vw, 100px);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff2c9;
            border-radius: 25px;
            border: 3px solid white;
            transform: scale(1);
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
            position: relative;
            z-index: 10;
        }

        .flower-item:active {
            transform: scale(0.7);
            filter: drop-shadow(0 2px 0 #d46b6b);
        }

        .flower-item.collected {
            opacity: 0;
            pointer-events: none;
            transform: scale(0);
        }

        .hint {
            color: #b54545;
            margin-top: 15px;
            font-size: clamp(0.9rem, 4vw, 1.2rem);
            z-index: 10;
            position: relative;
        }

        .final-section {
            margin: 20px 0 15px;
            display: none;
        }

        .final-section.show {
            display: block;
            animation: popIn 0.6s ease-out;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.3); }
            100% { opacity: 1; transform: scale(1); }
        }

        .bouquet-card {
            background: #ffdede;
            border-radius: min(40px, 8vw);
            padding: clamp(8px, 2vw, 12px);
            border: 4px solid white;
            box-shadow: 0 10px 0 #d46b6b;
            transform: rotate(1deg);
        }

        .bouquet-square {
            aspect-ratio: 1 / 1;
            width: 100%;
            background: linear-gradient(145deg, #ffb3b3, #ff8f8f);
            border-radius: min(35px, 7vw);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 3px solid white;
            position: relative;
            overflow: hidden;
        }

        .big-bouquet {
            font-size: clamp(4rem, 20vw, 8rem);
            line-height: 1;
            filter: drop-shadow(0 10px 8px rgba(180, 60, 60, 0.4));
            animation: wiggle 3s infinite;
            margin-bottom: clamp(5px, 2vw, 10px);
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }

        .for-you-text {
            font-size: clamp(1.5rem, 6vw, 2.5rem);
            font-weight: 800;
            color: white;
            text-shadow: 3px 3px 0 #d44b4b;
            background: rgba(255, 120, 120, 0.8);
            padding: clamp(5px, 2vw, 12px) clamp(10px, 4vw, 25px);
            border-radius: min(40px, 8vw);
            backdrop-filter: blur(3px);
            border: 2px solid white;
            letter-spacing: 2px;
            transform: rotate(-2deg);
            margin-top: clamp(3px, 1.5vw, 8px);
        }

        .big-corner-photo {
            position: absolute;
            bottom: clamp(10px, 3vw, 20px);
            right: clamp(10px, 3vw, 20px);
            width: clamp(60px, 15vw, 100px);
            height: clamp(60px, 15vw, 100px);
            border-radius: 50%;
            border: 3px solid white;
            object-fit: cover;
            box-shadow: 0 5px 0 #b15858, 0 10px 15px rgba(0,0,0,0.2);
            opacity: 0.95;
        }

        .congrats-message {
            background: #fff0f0;
            border-radius: min(30px, 6vw);
            padding: clamp(15px, 4vw, 25px);
            margin-top: 15px;
            border: 3px solid #ffa5a5;
            color: #882e2e;
            text-align: center;
        }

        .congrats-message h2 {
            font-size: clamp(1.5rem, 6vw, 2.2rem);
            color: #ff6b6b;
            margin-bottom: 10px;
        }

        .congrats-message p {
            font-size: clamp(0.9rem, 4vw, 1.2rem);
            line-height: 1.5;
            margin: 8px 0;
        }

        .reset-button {
            background: #ffa5a5;
            border: none;
            padding: clamp(12px, 4vw, 18px) clamp(20px, 6vw, 30px);
            border-radius: 60px;
            font-size: clamp(1rem, 4vw, 1.3rem);
            font-weight: bold;
            color: white;
            border-bottom: 4px solid #b15858;
            width: 100%;
            margin-top: 15px;
            cursor: pointer;
            transition: 0.1s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            z-index: 10;
        }

        .reset-button:active {
            border-bottom-width: 2px;
            transform: translateY(2px);
        }

        footer {
            text-align: center;
            margin-top: 12px;
            color: #b57a7a;
            font-size: clamp(0.7rem, 3vw, 0.9rem);
            position: relative;
            z-index: 10;
        }

        #bgMusic {
            display: none;
        }
    </style>
</head>
<body>
    <!-- ЛЕТАЮЩИЕ ФОТО -->
    <div class="floating-photos">
        <img src="foto1.jpg" class="float-photo" alt="фото1" onerror="this.style.background='#ffb3b3'; this.style.display='flex'; this.style.alignItems='center'; this.style.justifyContent='center'; this.style.fontSize='2rem'; this.alt='❤️';">
        <img src="foto2.jpg" class="float-photo" alt="фото2" onerror="this.style.background='#ffb3b3'; this.style.display='flex'; this.style.alignItems='center'; this.style.justifyContent='center'; this.style.fontSize='2rem'; this.alt='❤️';">
        <img src="foto3.jpg" class="float-photo" alt="фото3" onerror="this.style.background='#ffb3b3'; this.style.display='flex'; this.style.alignItems='center'; this.style.justifyContent='center'; this.style.fontSize='2rem'; this.alt='❤️';">
        <img src="foto4.jpg" class="float-photo" alt="фото4" onerror="this.style.background='#ffb3b3'; this.style.display='flex'; this.style.alignItems='center'; this.style.justifyContent='center'; this.style.fontSize='2rem'; this.alt='❤️';">
        <img src="foto5.jpg" class="float-photo" alt="фото5" onerror="this.style.background='#ffb3b3'; this.style.display='flex'; this.style.alignItems='center'; this.style.justifyContent='center'; this.style.fontSize='2rem'; this.alt='❤️';">
        <img src="foto6.jpg" class="float-photo" alt="фото6" onerror="this.style.background='#ffb3b3'; this.style.display='flex'; this.style.alignItems='center'; this.style.justifyContent='center'; this.style.fontSize='2rem'; this.alt='❤️';">
        <img src="foto7.jpg" class="float-photo" alt="фото7" onerror="this.style.background='#ffb3b3'; this.style.display='flex'; this.style.alignItems='center'; this.style.justifyContent='center'; this.style.fontSize='2rem'; this.alt='❤️';">
        <img src="foto8.jpg" class="float-photo" alt="фото8" onerror="this.style.background='#ffb3b3'; this.style.display='flex'; this.style.alignItems='center'; this.style.justifyContent='center'; this.style.fontSize='2rem'; this.alt='❤️';">
        <img src="foto9.jpg" class="float-photo" alt="фото9" onerror="this.style.background='#ffb3b3'; this.style.display='flex'; this.style.alignItems='center'; this.style.justifyContent='center'; this.style.fontSize='2rem'; this.alt='❤️';">
        <img src="foto10.jpg" class="float-photo" alt="фото10" onerror="this.style.background='#ffb3b3'; this.style.display='flex'; this.style.alignItems='center'; this.style.justifyContent='center'; this.style.fontSize='2rem'; this.alt='❤️';">
    </div>

    <div class="container">
        <div class="title">
            <h1>💐 8 марта 💐</h1>
            <p>Собери букет!</p>
        </div>

        <div class="counter-box">
            <span class="counter-text">🌷 цветов:</span>
            <span class="counter-number" id="counterDisplay">0/9</span>
        </div>

        <div class="game-area" id="gameArea">
            <div class="flowers-grid" id="flowersGrid"></div>
            <div class="hint" id="hintMessage">нажми на цветок 🌷</div>
        </div>

        <div class="final-section" id="finalSection">
            <div class="bouquet-card">
                <div class="bouquet-square">
                    <div class="big-bouquet">💐</div>
                    <div class="for-you-text">ЭТО ТЕБЕ</div>
                    <img src="foto1.jpg" class="big-corner-photo" id="cornerPhoto" onerror="this.style.background='#ffb3b3'; this.style.display='flex'; this.style.alignItems='center'; this.style.justifyContent='center'; this.style.fontSize='2rem'; this.alt='❤️';">
                </div>
            </div>
            
            <div class="congrats-message">
                <h2>С 8 Марта!</h2>
                <p>Моя любимая, этот букет</p>
                <p>для самой красивой девочки моей!</p>
                <p>❤️ ❤️ ❤️</p>
            </div>
        </div>

        <button class="reset-button" id="resetBtn">🌱 начать сначала</button>
        <footer>собери 9 цветов</footer>
    </div>

    <audio id="bgMusic" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        (function() {
            const MUSIC_START_SECONDS = 47;
            const TOTAL_FLOWERS = 9;
            let collectedCount = 0;
            let gameActive = true;
            let musicStarted = false;
            let musicReady = false;

            const flowersGrid = document.getElementById('flowersGrid');
            const counterDisplay = document.getElementById('counterDisplay');
            const gameArea = document.getElementById('gameArea');
            const finalSection = document.getElementById('finalSection');
            const hintMessage = document.getElementById('hintMessage');
            const resetBtn = document.getElementById('resetBtn');
            const bgMusic = document.getElementById('bgMusic');

            bgMusic.addEventListener('loadedmetadata', function() {
                if (bgMusic.duration > MUSIC_START_SECONDS) {
                    bgMusic.currentTime = MUSIC_START_SECONDS;
                }
                musicReady = true;
            });

            function tryPlayMusic() {
                if (!musicStarted && musicReady) {
                    bgMusic.play().then(() => {
                        musicStarted = true;
                    }).catch(() => {});
                }
            }

            function handleFlowerClick(flower) {
                if (!gameActive) return;
                if (flower.classList.contains('collected')) return;

                flower.classList.add('collected');
                collectedCount++;
                
                counterDisplay.textContent = `${collectedCount}/${TOTAL_FLOWERS}`;

                if (collectedCount === TOTAL_FLOWERS) {
                    gameActive = false;
                    gameArea.style.display = 'none';
                    finalSection.classList.add('show');
                    hintMessage.textContent = '🎉 букет собран! 🎉';
                } else {
                    hintMessage.textContent = `осталось ${TOTAL_FLOWERS - collectedCount}`;
                }
            }

            function createFlower() {
                const flower = document.createElement('div');
                flower.className = 'flower-item';
                flower.textContent = '🌷';

                flower.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    tryPlayMusic();
                    handleFlowerClick(this);
                });

                flower.addEventListener('touchstart', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    tryPlayMusic();
                    handleFlowerClick(this);
                }, { passive: false });

                return flower;
            }

            function resetGame() {
                flowersGrid.innerHTML = '';
                collectedCount = 0;
                gameActive = true;
                
                counterDisplay.textContent = `0/${TOTAL_FLOWERS}`;
                gameArea.style.display = 'flex';
                finalSection.classList.remove('show');
                hintMessage.textContent = 'нажми на цветок 🌷';

                for (let i = 0; i < TOTAL_FLOWERS; i++) {
                    flowersGrid.appendChild(createFlower());
                }
                
                if (musicReady) {
                    bgMusic.currentTime = MUSIC_START_SECONDS;
                }
                if (musicStarted) {
                    bgMusic.pause();
                    musicStarted = false;
                }
            }

            resetBtn.addEventListener('click', resetGame);
            resetBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                resetGame();
            }, { passive: false });
            
            resetGame();
            
            setTimeout(() => {
                tryPlayMusic();
            }, 500);
        })();
    </script>
</body>
</html>
