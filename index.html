<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>С 8 марта ❤️ букет для тебя</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffd0d0 0%, #ffadad 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            overflow-x: hidden;
            position: relative;
        }

        /* ЛЕТАЮЩИЕ ФОТО НА ФОНЕ */
        .floating-photos {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* Меньше чем контейнер */
            pointer-events: none; /* Чтобы не мешали нажатиям */
        }

        .float-photo {
            position: absolute;
            width: 100px;  /* Чуть меньше для телефона */
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 10px 20px rgba(255, 80, 80, 0.4);
            animation: float 15s infinite ease-in-out;
            opacity: 0.4; /* Прозрачнее чтобы не мешали */
        }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(30px, -30px) rotate(5deg); }
            50% { transform: translate(60px, 20px) rotate(-5deg); }
            75% { transform: translate(20px, 50px) rotate(3deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* РАСПОЛОЖЕНИЕ 10 ФОТО */
        .float-photo:nth-child(1) { top: 5%; left: 2%; animation-duration: 20s; }
        .float-photo:nth-child(2) { top: 70%; left: 5%; animation-duration: 24s; }
        .float-photo:nth-child(3) { top: 15%; right: 2%; animation-duration: 22s; }
        .float-photo:nth-child(4) { bottom: 10%; right: 5%; animation-duration: 26s; }
        .float-photo:nth-child(5) { top: 40%; left: 20%; animation-duration: 19s; }
        .float-photo:nth-child(6) { top: 10%; left: 60%; animation-duration: 21s; }
        .float-photo:nth-child(7) { bottom: 20%; left: 15%; animation-duration: 23s; }
        .float-photo:nth-child(8) { top: 60%; right: 10%; animation-duration: 20s; }
        .float-photo:nth-child(9) { bottom: 30%; right: 25%; animation-duration: 25s; }
        .float-photo:nth-child(10) { top: 80%; left: 40%; animation-duration: 22s; }

        .container {
            max-width: 440px;
            width: 100%;
            background: rgba(255, 240, 240, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 20px 15px;
            box-shadow: 0 15px 30px rgba(255, 100, 100, 0.3), 0 0 0 3px white inset;
            border: 1px solid #ffaeae;
            position: relative;
            z-index: 2; /* Выше чем фото */
        }

        .title {
            text-align: center;
            margin-bottom: 15px;
        }

        .title h1 {
            font-size: 2.2rem;
            color: #d43b3b;
            text-shadow: 2px 2px 0 #ffe0e0;
        }

        .title p {
            color: #b54545;
            font-size: 1.1rem;
        }

        .counter-box {
            background: white;
            border-radius: 50px;
            padding: 10px 18px;
            margin: 10px 0 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 0 #ff9f9f;
            border: 2px solid #ff7b7b;
        }

        .counter-text {
            color: #b54545;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .counter-number {
            background: #ff7b7b;
            color: white;
            padding: 5px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.3rem;
            box-shadow: 0 3px 0 #b54545;
        }

        .game-area {
            background: #ffc9c9;
            border-radius: 40px;
            padding: 20px 10px;
            border: 3px dashed white;
            margin-bottom: 15px;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .game-area.hidden {
            display: none;
        }

        .flowers-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        .flower-item {
            font-size: 3.2rem;
            cursor: pointer;
            transition: all 0.2s ease;
            filter: drop-shadow(0 4px 0 #d46b6b);
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff2c9;
            border-radius: 25px;
            border: 3px solid white;
            transform: scale(1);
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .flower-item:active {
            transform: scale(0.7);
            filter: drop-shadow(0 2px 0 #d46b6b);
        }

        .flower-item.collected {
            opacity: 0;
            pointer-events: none;
            transform: scale(0);
        }

        .hint {
            color: #b54545;
            margin-top: 12px;
            font-size: 1rem;
        }

        .final-section {
            margin: 15px 0 10px;
            display: none;
        }

        .final-section.show {
            display: block;
            animation: popIn 0.6s ease-out;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.3); }
            100% { opacity: 1; transform: scale(1); }
        }

        .bouquet-card {
            background: #ffdede;
            border-radius: 40px;
            padding: 8px;
            border: 4px solid white;
            box-shadow: 0 10px 0 #d46b6b;
            transform: rotate(1deg);
        }

        .bouquet-square {
            aspect-ratio: 1 / 1;
            width: 100%;
            background: linear-gradient(145deg, #ffb3b3, #ff8f8f);
            border-radius: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 3px solid white;
            position: relative;
            overflow: hidden;
        }

        .big-bouquet {
            font-size: 6rem;
            line-height: 1;
            filter: drop-shadow(0 10px 8px rgba(180, 60, 60, 0.4));
            animation: wiggle 3s infinite;
            margin-bottom: 5px;
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }

        .for-you-text {
            font-size: 2rem;
            font-weight: 800;
            color: white;
            text-shadow: 3px 3px 0 #d44b4b;
            background: rgba(255, 120, 120, 0.8);
            padding: 8px 20px;
            border-radius: 40px;
            backdrop-filter: blur(3px);
            border: 2px solid white;
            letter-spacing: 3px;
            transform: rotate(-2deg);
            margin-top: 5px;
        }

        .big-corner-photo {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 70px;
            height: 70px;
            border-radius: 35px;
            border: 3px solid white;
            object-fit: cover;
            box-shadow: 0 5px 0 #b15858;
            opacity: 0.95;
        }

        .congrats-message {
            background: #fff0f0;
            border-radius: 30px;
            padding: 15px;
            margin-top: 12px;
            border: 2px solid #ffa5a5;
            color: #882e2e;
            text-align: center;
        }

        .congrats-message h2 {
            font-size: 1.8rem;
            color: #ff6b6b;
            margin-bottom: 8px;
        }

        .congrats-message p {
            font-size: 1rem;
            line-height: 1.4;
            margin: 5px 0;
        }

        .reset-button {
            background: #ffa5a5;
            border: none;
            padding: 14px 25px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            border-bottom: 4px solid #b15858;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
            transition: 0.1s;
            touch-action: manipulation;
        }

        .reset-button:active {
            border-bottom-width: 2px;
            transform: translateY(2px);
        }

        footer {
            text-align: center;
            margin-top: 12px;
            color: #b57a7a;
            font-size: 0.8rem;
        }

        #bgMusic {
            display: none;
        }
    </style>
</head>
<body>
    <!-- ЛЕТАЮЩИЕ ФОТО -->
    <div class="floating-photos">
        <img src="1.jpg" class="float-photo" alt="фото1">
        <img src="2.jpg" class="float-photo" alt="фото2">
        <img src="3.jpg" class="float-photo" alt="фото3">
        <img src="4.jpg" class="float-photo" alt="фото4">
        <img src="5.jpg" class="float-photo" alt="фото5">
        <img src="6.jpg" class="float-photo" alt="фото6">
        <img src="7.jpg" class="float-photo" alt="фото7">
        <img src="8.jpg" class="float-photo" alt="фото8">
        <img src="9.jpg" class="float-photo" alt="фото9">
        <img src="10.jpg" class="float-photo" alt="фото10">
    </div>

    <div class="container">
        <div class="title">
            <h1>🌸 8 марта 🌸</h1>
            <p>собери букет для меня</p>
        </div>

        <div class="counter-box">
            <span class="counter-text">🌷 цветов:</span>
            <span class="counter-number" id="counterDisplay">0/9</span>
        </div>

        <div class="game-area" id="gameArea">
            <div class="flowers-grid" id="flowersGrid"></div>
            <div class="hint" id="hintMessage">нажми на цветок 🌷</div>
        </div>

        <div class="final-section" id="finalSection">
            <div class="bouquet-card">
                <div class="bouquet-square">
                    <div class="big-bouquet">💐</div>
                    <div class="for-you-text">ЭТО ТЕБЕ</div>
                    <img src="1.jpg" class="big-corner-photo" id="cornerPhoto">
                </div>
            </div>
            
            <div class="congrats-message">
                <h2>С 8 Марта!</h2>
                <p>Моя любимая, этот букет</p>
                <p>для самой красивой девушки</p>
                <p>❤️ ❤️ ❤️</p>
                <p><em>твой человек</em></p>
            </div>
        </div>

        <button class="reset-button" id="resetBtn">🌱 начать сначала</button>
        <footer>собери 9 цветов</footer>
    </div>

    <audio id="bgMusic" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        (function() {
            const MUSIC_START_SECONDS = 47;
            const TOTAL_FLOWERS = 9;
            let collectedCount = 0;
            let gameActive = true;
            let musicStarted = false;
            let musicReady = false;

            const flowersGrid = document.getElementById('flowersGrid');
            const counterDisplay = document.getElementById('counterDisplay');
            const gameArea = document.getElementById('gameArea');
            const finalSection = document.getElementById('finalSection');
            const hintMessage = document.getElementById('hintMessage');
            const resetBtn = document.getElementById('resetBtn');
            const bgMusic = document.getElementById('bgMusic');

            if (!flowersGrid || !counterDisplay || !gameArea || !finalSection || !hintMessage || !resetBtn || !bgMusic) {
                return;
            }

            bgMusic.addEventListener('loadedmetadata', function() {
                if (bgMusic.duration > MUSIC_START_SECONDS) {
                    bgMusic.currentTime = MUSIC_START_SECONDS;
                }
                musicReady = true;
            });

            if (bgMusic.readyState >= 1) {
                if (bgMusic.duration > MUSIC_START_SECONDS) {
                    bgMusic.currentTime = MUSIC_START_SECONDS;
                }
                musicReady = true;
            }

            function tryPlayMusic() {
                if (!musicStarted && musicReady) {
                    bgMusic.play().then(() => {
                        musicStarted = true;
                    }).catch(() => {});
                }
            }

            function createFlower(index) {
                const flower = document.createElement('div');
                flower.className = 'flower-item';
                flower.dataset.index = index;
                flower.textContent = '🌷';

                flower.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    tryPlayMusic();
                    
                    if (!gameActive) return;
                    if (flower.classList.contains('collected')) return;

                    flower.classList.add('collected');
                    collectedCount++;
                    
                    if (counterDisplay) {
                        counterDisplay.textContent = `${collectedCount}/${TOTAL_FLOWERS}`;
                    }

                    if (collectedCount === TOTAL_FLOWERS) {
                        gameActive = false;
                        if (gameArea) gameArea.style.display = 'none';
                        if (finalSection) finalSection.classList.add('show');
                        if (hintMessage) hintMessage.textContent = '🎉 букет собран! 🎉';
                    } else {
                        if (hintMessage) {
                            hintMessage.textContent = `осталось ${TOTAL_FLOWERS - collectedCount}`;
                        }
                    }
                });

                flower.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    tryPlayMusic();
                }, { passive: false });

                return flower;
            }

            function resetGame() {
                if (!flowersGrid) return;
                
                flowersGrid.innerHTML = '';
                collectedCount = 0;
                gameActive = true;
                
                if (counterDisplay) {
                    counterDisplay.textContent = `0/${TOTAL_FLOWERS}`;
                }
                
                if (gameArea) gameArea.style.display = 'flex';
                if (finalSection) finalSection.classList.remove('show');
                if (hintMessage) hintMessage.textContent = 'нажми на цветок 🌷';

                for (let i = 0; i < TOTAL_FLOWERS; i++) {
                    const flower = createFlower(i);
                    flowersGrid.appendChild(flower);
                }
                
                if (musicReady && bgMusic) {
                    bgMusic.currentTime = MUSIC_START_SECONDS;
                }
                if (musicStarted && bgMusic) {
                    bgMusic.pause();
                    musicStarted = false;
                }
            }

            if (resetBtn) {
                resetBtn.addEventListener('click', resetGame);
            }
            
            resetGame();
            
            setTimeout(() => {
                tryPlayMusic();
            }, 500);

            // Заглушки для фото
            const photos = document.querySelectorAll('.float-photo, #cornerPhoto');
            photos.forEach(img => {
                img.onerror = function() {
                    this.style.background = '#ffb3b3';
                    this.style.display = 'flex';
                    this.style.alignItems = 'center';
                    this.style.justifyContent = 'center';
                    this.style.fontSize = '2rem';
                    this.alt = '❤️';
                };
            });
        })();
    </script>
</body>
</html>
